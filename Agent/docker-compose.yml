version: "3.9"

services:
  backend:
    build: .
    container_name: codex-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:6
    container_name: codex-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    container_name: codex-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongo_data: